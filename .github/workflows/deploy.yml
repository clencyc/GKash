name: Build and Deploy APK to GH Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Prepare Deployment Folder
        run: |
          mkdir -p release
          # Find the debug APK and copy it
          APK_FILE=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          if [ -z "$APK_FILE" ]; then
            echo "Error: No APK found!"
            exit 1
          fi
          cp "$APK_FILE" release/GKash-debug.apk
          
          # Add .nojekyll to prevent Jekyll from processing the site
          touch release/.nojekyll
          
          echo "<!DOCTYPE html>
          <html>
          <head>
            <meta charset='utf-8'>
            <meta name='viewport' content='width=device-width, initial-scale=1'>
            <title>GKash | Download Latest Release</title>
            <style>
              :root { --primary: #D91A5B; --dark: #1A1A2E; }
              body { 
                font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
                display: flex; align-items: center; justify-content: center; 
                min-height: 100vh; margin: 0; background: #f8f9fa; color: #333;
              }
              .card { 
                background: white; padding: 2.5rem; border-radius: 20px; 
                box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; 
                max-width: 400px; width: 90%;
              }
              .logo { width: 80px; height: 80px; margin-bottom: 1.5rem; border-radius: 16px; box-shadow: 0 4px 10px rgba(217,26,91,0.3); }
              h1 { margin: 0; color: var(--dark); font-size: 1.8rem; }
              p { color: #666; margin: 1rem 0 2rem; line-height: 1.5; }
              .btn { 
                display: inline-block; padding: 1rem 2rem; 
                background: var(--primary); color: white; 
                text-decoration: none; border-radius: 12px; 
                font-weight: bold; transition: all 0.3s ease;
                box-shadow: 0 4px 12px rgba(217,26,91,0.4);
              }
              .btn:hover { background: #C4164E; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(217,26,91,0.5); }
              .footer { margin-top: 2rem; font-size: 0.8rem; color: #999; }
            </style>
          </head>
          <body>
            <div class='card'>
              <img src='GKash-logo-placeholder.png' alt='GKash Logo' class='logo' onerror=\"this.style.display='none'\">
              <h1>GKash Android</h1>
              <p>Download the latest version of GKash to start your financial journey.</p>
              <a href='GKash-debug.apk' class='btn' download>Download APK</a>
              <div class='footer'>Version 1.0.0 | Financial Simulator Updates</div>
            </div>
          </body>
          </html>" > release/index.html
          
          # Copy the logo for the download page too if possible
          if [ -f "app/src/main/res/drawable/gkash_logo.png" ]; then
            cp "app/src/main/res/drawable/gkash_logo.png" release/GKash-logo-placeholder.png
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: release
          clean: true
